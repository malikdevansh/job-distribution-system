version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobqueue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jobqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/jobqueue?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecret123
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-service:
    build:
      context: .
      dockerfile: apps/worker-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/jobqueue?schema=public
      - REDIS_URL=redis://redis:6379
      - PROJECT_ID=11111111-1111-4111-8111-111111111111
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-api:
        condition: service_started

  scheduler-service:
    build:
      context: .
      dockerfile: apps/scheduler-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/jobqueue?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-api:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend-api:
        condition: service_started

volumes:
  pgdata:
